<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMJH | Luxury Gold Exchange Calculator</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-cream: #FFF9F2;
            --card-white: #FFFFFF;
            --text-dark: #111111;
            --gold-accent: #C9A86A;
            --border-gold: #E5D3A1;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-cream); 
            color: var(--text-dark); 
            -webkit-font-smoothing: antialiased;
        }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        .receipt-card {
            background-color: var(--card-white);
            border: 1px solid var(--border-gold);
            box-shadow: 0 20px 40px rgba(0,0,0,0.03);
        }
        
        .gold-highlight {
            background-color: var(--bg-cream);
            border: 1px solid var(--gold-accent);
        }

        /* Custom Scrollbar for Admin Panel */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-gold); border-radius: 10px; }

        @media print {
            body { background-color: white; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .no-print { display: none !important; }
            main.grid { display: block !important; }
            #receipt { 
                box-shadow: none !important; 
                border: none !important; 
                width: 100% !important; 
                max-width: 100% !important; 
                margin: 0 auto !important; 
                padding: 20px !important;
                page-break-inside: avoid;
            }
            .print-area { padding: 0px; }
            @page { margin: 1cm; size: A4 portrait; }
        }
    </style>
</head>
<body class="pb-24 md:pb-10 p-4 md:p-10 min-h-screen">

    <header class="max-w-6xl mx-auto mb-10 flex justify-between items-end no-print border-b border-[#E5D3A1] pb-4">
        <div class="flex items-center gap-5">
            <img src="logo.png" alt="TMJH Logo" onerror="this.style.display='none'" class="w-16 h-16 object-contain rounded">
            <div>
                <h1 class="text-3xl font-serif font-bold text-[#111111] leading-tight">TMJH</h1>
                <p class="text-xs tracking-[0.2em] uppercase text-[#C9A86A] font-medium">The Modern Jewellery House</p>
            </div>
        </div>
        <button onclick="toggleAdmin()" class="text-sm font-medium tracking-wide uppercase text-[#111111] hover:text-[#C9A86A] transition-colors border-b border-transparent hover:border-[#C9A86A] pb-1">
            Admin Panel
        </button>
    </header>

    <main class="max-w-6xl mx-auto grid lg:grid-cols-12 gap-10">
        
        <section class="lg:col-span-5 space-y-6 no-print">
            <div class="bg-white p-8 rounded-xl border border-[#E5D3A1] shadow-sm">
                <h3 class="font-serif font-semibold text-xl mb-6 text-[#111111] flex items-center gap-2">
                    <svg class="w-5 h-5 text-[#C9A86A]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                    Calculation Details
                </h3>
                
                <div class="space-y-6">
                    <div class="group">
                        <label class="block text-xs font-semibold tracking-wider uppercase mb-2 text-[#111111] opacity-70 group-focus-within:opacity-100 group-focus-within:text-[#C9A86A] transition-colors">1 Gram Gold Rate (₹)</label>
                        <input type="number" id="rate1g" oninput="calculate()" class="w-full border-b-2 border-[#E5D3A1] bg-transparent pb-2 text-lg focus:outline-none focus:border-[#C9A86A] transition-colors" placeholder="0">
                    </div>
                    <div class="group">
                        <label class="block text-xs font-semibold tracking-wider uppercase mb-2 text-[#111111] opacity-70 group-focus-within:opacity-100 group-focus-within:text-[#C9A86A] transition-colors">Gold Quantity (gm)</label>
                        <input type="number" id="qty" oninput="calculate()" class="w-full border-b-2 border-[#E5D3A1] bg-transparent pb-2 text-lg focus:outline-none focus:border-[#C9A86A] transition-colors" placeholder="0.000">
                    </div>
                    <div class="group">
                        <label id="makingLabel" class="block text-xs font-semibold tracking-wider uppercase mb-2 text-[#111111] opacity-70 group-focus-within:opacity-100 group-focus-within:text-[#C9A86A] transition-colors">Making Charge (%)</label>
                        <input type="number" id="making" oninput="calculate()" class="w-full border-b-2 border-[#E5D3A1] bg-transparent pb-2 text-lg focus:outline-none focus:border-[#C9A86A] transition-colors" placeholder="0.0">
                    </div>
                    <div class="group">
                        <label class="block text-xs font-semibold tracking-wider uppercase mb-2 text-[#111111] opacity-70 group-focus-within:opacity-100 group-focus-within:text-[#C9A86A] transition-colors">HM Quantity (Pieces)</label>
                        <input type="number" id="hmQty" oninput="calculate()" class="w-full border-b-2 border-[#E5D3A1] bg-transparent pb-2 text-lg focus:outline-none focus:border-[#C9A86A] transition-colors" placeholder="0">
                    </div>
                    <div class="group pt-4 border-t border-[#E5D3A1]/50">
                        <label class="block text-xs font-semibold tracking-wider uppercase mb-2 text-[#111111] opacity-70 group-focus-within:opacity-100 group-focus-within:text-[#C9A86A] transition-colors">Old Gold Quantity (gm)</label>
                        <input type="number" id="oldGold" oninput="calculate()" class="w-full border-b-2 border-[#E5D3A1] bg-transparent pb-2 text-lg focus:outline-none focus:border-[#C9A86A] transition-colors" placeholder="0.000">
                        <p class="text-[10px] text-gray-500 mt-2 uppercase tracking-wide">GST is not applied on old gold</p>
                    </div>
                </div>
            </div>
            
            <div class="hidden md:grid grid-cols-3 gap-4 no-print">
                <button onclick="window.print()" class="flex flex-col items-center justify-center gap-2 py-4 bg-white border border-[#E5D3A1] rounded-xl hover:border-[#C9A86A] hover:bg-[#FFF9F2] hover:shadow-md transition-all text-[#111111]">
                    <svg class="w-6 h-6 text-[#C9A86A]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                    <span class="text-xs font-medium uppercase tracking-wide">Print</span>
                </button>
                <button onclick="downloadPDF()" class="flex flex-col items-center justify-center gap-2 py-4 bg-white border border-[#E5D3A1] rounded-xl hover:border-[#C9A86A] hover:bg-[#FFF9F2] hover:shadow-md transition-all text-[#111111]">
                    <svg class="w-6 h-6 text-[#C9A86A]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                    <span class="text-xs font-medium uppercase tracking-wide">PDF</span>
                </button>
                <button onclick="downloadPNG()" class="flex flex-col items-center justify-center gap-2 py-4 bg-white border border-[#E5D3A1] rounded-xl hover:border-[#C9A86A] hover:bg-[#FFF9F2] hover:shadow-md transition-all text-[#111111]">
                    <svg class="w-6 h-6 text-[#C9A86A]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <span class="text-xs font-medium uppercase tracking-wide">Image</span>
                </button>
            </div>
        </section>

        <section class="lg:col-span-7">
            <!-- This div is what gets exported/printed -->
            <div id="receipt" class="receipt-card p-8 md:p-12 rounded-xl print-area">
                
                <!-- Receipt Header -->
                <div class="text-center mb-8 pb-8 border-b border-[#E5D3A1]">
                    <img src="logo.png" onerror="this.style.display='none'" class="w-20 mx-auto mb-4 object-contain">
                    <h2 class="text-3xl font-serif font-bold text-[#111111]">TMJH</h2>
                    <p class="text-sm tracking-[0.2em] uppercase text-[#C9A86A] mt-1">The Modern Jewellery House</p>
                    
                    
                    <div class="flex justify-between items-center mt-8 text-xs font-medium opacity-80">
                        <span id="receiptDate"></span>
                        <span id="receiptId" class="font-mono"></span>
                    </div>
                </div>

                <!-- Calculation Inject Container -->
                <div id="results" class="space-y-6">
                    <!-- Javascript will inject sections here -->
                </div>
                
                <!-- Receipt Footer -->
                <div class="mt-12 text-center text-[10px] text-gray-400 uppercase tracking-widest">
                    <p>Thank you for choosing TMJH</p>
                    <p class="mt-1">This is a computer generated estimate</p>
                </div>
            </div>
        </section>
    </main>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white/90 backdrop-blur-md border-t border-[#E5D3A1] md:hidden z-40 shadow-[0_-10px_20px_rgba(0,0,0,0.05)] no-print">
        <div class="flex gap-3 max-w-md mx-auto">
            <button onclick="window.print()" class="flex-1 flex flex-col items-center justify-center py-2 px-1 bg-white border border-[#E5D3A1] rounded-lg shadow-sm text-[#111111] active:bg-[#FFF9F2]">
                <svg class="w-5 h-5 mb-1 text-[#C9A86A]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                <span class="text-[10px] uppercase font-semibold">Print</span>
            </button>
            <button onclick="downloadPDF()" class="flex-1 flex flex-col items-center justify-center py-2 px-1 bg-white border border-[#E5D3A1] rounded-lg shadow-sm text-[#111111] active:bg-[#FFF9F2]">
                <svg class="w-5 h-5 mb-1 text-[#C9A86A]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                <span class="text-[10px] uppercase font-semibold">PDF</span>
            </button>
            <button onclick="downloadPNG()" class="flex-1 flex flex-col items-center justify-center py-2 px-1 bg-white border border-[#E5D3A1] rounded-lg shadow-sm text-[#111111] active:bg-[#FFF9F2]">
                <svg class="w-5 h-5 mb-1 text-[#C9A86A]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                <span class="text-[10px] uppercase font-semibold">Image</span>
            </button>
            <button onclick="shareReceipt()" class="flex-1 flex flex-col items-center justify-center py-2 px-1 bg-white border border-[#E5D3A1] rounded-lg shadow-sm text-[#111111] active:bg-[#FFF9F2]">
                <svg class="w-5 h-5 mb-1 text-[#C9A86A]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
                <span class="text-[10px] uppercase font-semibold">Share</span>
            </button>
        </div>
    </div>

    <div id="adminPanel" class="fixed inset-0 bg-black/40 backdrop-blur-sm hidden z-50 flex justify-end no-print transition-opacity">
        <div class="w-full max-w-sm bg-white h-full p-8 overflow-y-auto shadow-2xl animate-[slideIn_0.3s_ease-out]">
            <div class="flex justify-between items-center mb-8 border-b border-[#E5D3A1] pb-4">
                <h3 class="font-serif text-2xl font-bold text-[#111111]">Store Settings</h3>
                <button onclick="toggleAdmin()" class="text-gray-400 hover:text-[#111111] transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>

            <!-- Password Protection Area -->
            <div id="authArea" class="space-y-4">
                <label class="block text-xs uppercase tracking-wide font-semibold">Enter Admin Password</label>
                <div class="relative">
                    <input type="password" id="adminPass" class="w-full p-3 border-2 border-[#E5D3A1] rounded-lg focus:outline-none focus:border-[#C9A86A] transition-colors pr-10" placeholder="Password">
                    <button type="button" onclick="togglePasswordVisibility()" class="absolute right-3 top-3.5 text-gray-400 hover:text-[#111111]">
                        <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                    </button>
                </div>
            </div>

            <!-- Secured Controls Area -->
            <div id="adminControls" class="hidden space-y-6 mt-6">
                <div>
                    <label class="block text-xs uppercase tracking-wide font-semibold mb-2">GST %</label>
                    <input type="number" id="setGst" class="w-full p-3 border-2 border-[#E5D3A1] rounded-lg focus:outline-none focus:border-[#C9A86A]">
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-wide font-semibold mb-2">HM Rate per Piece (₹)</label>
                    <input type="number" id="setHmRate" class="w-full p-3 border-2 border-[#E5D3A1] rounded-lg focus:outline-none focus:border-[#C9A86A]">
                </div>
                <button onclick="saveAdmin()" class="w-full bg-[#111111] hover:bg-[#C9A86A] text-white font-medium py-4 rounded-lg uppercase tracking-widest transition-colors mt-8">
                    Update System Rates
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification System -->
    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 bg-[#111111] text-white px-6 py-3 rounded-full shadow-2xl transition-all duration-300 opacity-0 pointer-events-none z-[60] flex items-center gap-2">
        <svg class="w-5 h-5 text-[#C9A86A]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        <span id="toastMsg" class="text-sm font-medium tracking-wide"></span>
    </div>

    <style>
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>

    <script>
        const ADMIN_SECRET = "Santosh321";
        const defaults = { gst: 3, hmRate: 55 };
        let config = JSON.parse(localStorage.getItem('tjmhConfig')) || defaults;

        // Utility: Show custom toast notification instead of alert()
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = message;
            toast.classList.remove('opacity-0', 'pointer-events-none');
            toast.classList.add('opacity-100');
            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0', 'pointer-events-none');
            }, 3000);
        }

        // Utility: Format currency beautifully without decimals
        function fmt(num) {
            return '₹' + Math.round(num).toLocaleString('en-IN', { maximumFractionDigits: 0, minimumFractionDigits: 0 });
        }
        function fmtWt(num) {
            return num.toLocaleString('en-IN', { maximumFractionDigits: 3, minimumFractionDigits: 3 }) + ' gm';
        }

        function toggleAdmin() {
            const panel = document.getElementById('adminPanel');
            panel.classList.toggle('hidden');
            
            // Reset password field on open
            if(!panel.classList.contains('hidden')) {
                document.getElementById('adminPass').value = '';
                document.getElementById('adminControls').classList.add('hidden');
                document.getElementById('authArea').classList.remove('hidden');
            }
        }

        function togglePasswordVisibility() {
            const input = document.getElementById('adminPass');
            const icon = document.getElementById('eyeIcon');
            if (input.type === "password") {
                input.type = "text";
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>`;
            } else {
                input.type = "password";
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>`;
            }
        }

        document.getElementById('adminPass').addEventListener('input', (e) => {
            if(e.target.value === ADMIN_SECRET) {
                document.getElementById('authArea').classList.add('hidden');
                document.getElementById('adminControls').classList.remove('hidden');
                
                // Load current values into inputs
                document.getElementById('setGst').value = config.gst;
                document.getElementById('setHmRate').value = config.hmRate;
            }
        });

        function saveAdmin() {
            config = { 
                gst: parseFloat(document.getElementById('setGst').value) || defaults.gst, 
                hmRate: parseFloat(document.getElementById('setHmRate').value) || defaults.hmRate 
            };
            localStorage.setItem('tjmhConfig', JSON.stringify(config));
            showToast('System rates updated successfully');
            calculate();
            toggleAdmin(); // Close drawer after save
        }

        function generateReceiptId() {
            const date = new Date();
            const yyyy = date.getFullYear();
            const mm = String(date.getMonth() + 1).padStart(2, '0');
            const dd = String(date.getDate()).padStart(2, '0');
            const random = Math.floor(1000 + Math.random() * 9000);
            return `ID: TMJH-${yyyy}${mm}${dd}-${random}`;
        }

        function calculate() {
            const rate1g = parseFloat(document.getElementById('rate1g').value) || 0;
            const q = parseFloat(document.getElementById('qty').value) || 0;
            const m = parseFloat(document.getElementById('making').value) || 0;
            const hq = parseFloat(document.getElementById('hmQty').value) || 0;
            const oq = parseFloat(document.getElementById('oldGold').value) || 0;

            // Auto-switch Making Charge Mode based on Quantity
            const makingLabel = document.getElementById('makingLabel');
            const makingInput = document.getElementById('making');
            const isFlatRate = q > 0 && q <= 1.00;

            if (isFlatRate) {
                makingLabel.innerText = "Making Charge (₹)";
                if (makingInput.placeholder !== "0") makingInput.placeholder = "0";
            } else {
                makingLabel.innerText = "Making Charge (%)";
                if (makingInput.placeholder !== "0.0") makingInput.placeholder = "0.0";
            }

            // 1. New Gold Calculation
            const goldVal = q * rate1g;
            const mkAmt = isFlatRate ? m : goldVal * (m / 100);
            const subtotal = goldVal + mkAmt;
            
            // 2. GST (Applies ONLY to New Gold Subtotal)
            const gstAmt = subtotal * (config.gst / 100);
            
            // 3. HM Amount
            const hmAmt = hq * config.hmRate;
            
            // Total Value of New Items
            const totalNewValue = subtotal + gstAmt + hmAmt;
            
            // 4. Old Gold Exchange
            const oldGoldVal = oq * rate1g;
            
            // 5. Final Payable
            const finalPayable = totalNewValue - oldGoldVal;

            // Update Header Info
            const now = new Date();
            document.getElementById('receiptDate').innerText = now.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute:'2-digit' });
            if(!document.getElementById('receiptId').innerText) {
                document.getElementById('receiptId').innerText = generateReceiptId();
            }

            document.getElementById('results').innerHTML = `
                <!-- Section 1: New Gold -->
                <div class="mb-6">
                    <h4 class="text-[10px] uppercase font-bold tracking-widest text-[#C9A86A] mb-3 border-b border-[#E5D3A1] pb-1">New Gold Purchase</h4>
                    <div class="space-y-2.5 text-sm font-medium">
                        <div class="flex justify-between items-center text-gray-500 text-xs"><span>1g Gold Rate</span><span>${fmt(rate1g)}</span></div>
                        <div class="flex justify-between items-center mt-2"><span>Gold Quantity</span><span>${fmtWt(q)}</span></div>
                        <div class="flex justify-between items-center"><span>Gold Value</span><span>${fmt(goldVal)}</span></div>
                        <div class="flex justify-between items-center"><span>${isFlatRate ? 'Making Charge (₹)' : `Making Charge (${m}%)`}</span><span>${fmt(mkAmt)}</span></div>
                        <div class="flex justify-between items-center pt-2 border-t border-dashed border-[#E5D3A1]"><span>Subtotal</span><span>${fmt(subtotal)}</span></div>
                        <div class="flex justify-between items-center"><span>GST (${config.gst}%)</span><span>${fmt(gstAmt)}</span></div>
                        <div class="flex justify-between items-center"><span>HM Charges (${hq} pcs)</span><span>${fmt(hmAmt)}</span></div>
                    </div>
                </div>

                <!-- Section 2: Old Gold Exchange -->
                ${oq > 0 ? `
                <div class="mb-6">
                    <h4 class="text-[10px] uppercase font-bold tracking-widest text-[#C9A86A] mb-3 border-b border-[#E5D3A1] pb-1">Old Gold Exchange</h4>
                    <div class="space-y-2.5 text-sm font-medium">
                        <div class="flex justify-between items-center text-gray-500 text-xs"><span>Applied Exchange Rate</span><span>${fmt(rate1g)} / gm</span></div>
                        <div class="flex justify-between items-center"><span>Old Gold Quantity</span><span>${fmtWt(oq)}</span></div>
                        <div class="flex justify-between items-center text-red-600"><span>Old Gold Value</span><span>-${fmt(oldGoldVal)}</span></div>
                    </div>
                </div>
                ` : ''}

                <!-- Section 3: Final Summary -->
                <div class="mt-8">
                    <h4 class="text-[10px] uppercase font-bold tracking-widest text-[#C9A86A] mb-3 border-b border-[#E5D3A1] pb-1">Final Summary</h4>
                    <div class="space-y-2.5 text-sm font-medium mb-4">
                        <div class="flex justify-between items-center"><span>Total New Jewellery Value</span><span>${fmt(totalNewValue)}</span></div>
                        <div class="flex justify-between items-center text-red-600"><span>Less: Old Gold Exchange</span><span>-${fmt(oldGoldVal)}</span></div>
                    </div>
                    
                    <div class="gold-highlight p-5 rounded-lg flex justify-between items-center mt-4 shadow-sm">
                        <span class="text-xs font-bold uppercase tracking-widest text-[#111111]">Final Payable</span>
                        <span class="text-2xl font-serif font-bold text-[#111111]">${fmt(finalPayable)}</span>
                    </div>
                </div>
            `;
        }

        // --- EXPORT FIXES START ---

        function getFilenameStr() {
            const d = new Date();
            const pad = n => String(n).padStart(2, '0');
            return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}_${pad(d.getHours())}-${pad(d.getMinutes())}`;
        }

        async function waitForAssets(element) {
            await document.fonts.ready; // Wait for Playfair/Inter fonts
            const images = element.querySelectorAll('img');
            const promises = Array.from(images).map(img => {
                if (img.complete) return Promise.resolve();
                return new Promise(resolve => {
                    img.onload = resolve;
                    img.onerror = resolve; // resolve anyway to avoid hanging
                });
            });
            await Promise.all(promises);
            // Small delay to ensure browser rendering cycle completes
            await new Promise(r => setTimeout(r, 200));
        }

        async function downloadPDF() {
            try {
                showToast('Preparing PDF... Please wait.');
                const element = document.getElementById('receipt');
                await waitForAssets(element);

                // Capture high-res canvas (no cropping)
                const canvas = await html2canvas(element, { 
                    scale: 3, 
                    useCORS: true, 
                    backgroundColor: '#FFFFFF',
                    scrollY: -window.scrollY // Fixes shifting issues based on scroll position
                });

                const imgData = canvas.toDataURL('image/jpeg', 1.0);
                
                // Initialize jsPDF (Portrait, mm, A4)
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = pdf.internal.pageSize.getHeight();
                
                // Calculate scale to perfectly fit on a single page with 10mm margins
                const margin = 10;
                const maxImgWidth = pdfWidth - (margin * 2);
                const maxImgHeight = pdfHeight - (margin * 2);
                
                const imgRatio = canvas.width / canvas.height;
                let finalWidth = maxImgWidth;
                let finalHeight = finalWidth / imgRatio;

                // Ensure it doesn't bleed out of the page vertically
                if (finalHeight > maxImgHeight) {
                    finalHeight = maxImgHeight;
                    finalWidth = finalHeight * imgRatio;
                }
                
                // Center horizontally, push from top by margin
                const x = (pdfWidth - finalWidth) / 2;
                const y = margin;

                pdf.addImage(imgData, 'JPEG', x, y, finalWidth, finalHeight);
                pdf.save(`TMJH_Receipt_${getFilenameStr()}.pdf`);
                showToast('PDF downloaded successfully');
            } catch (err) {
                console.error('PDF Export Error:', err);
                showToast('Failed to generate PDF. Please try again.');
            }
        }

        async function downloadPNG() {
            try {
                showToast('Preparing Image... Please wait.');
                const element = document.getElementById('receipt');
                await waitForAssets(element);

                const originalCanvas = await html2canvas(element, { 
                    scale: 3, 
                    useCORS: true, 
                    backgroundColor: '#FFFFFF',
                    scrollY: -window.scrollY
                });

                // Target aspect ratio 4:5 (Width:Height) => 0.8
                const targetRatio = 4 / 5;
                const origW = originalCanvas.width;
                const origH = originalCanvas.height;
                const origRatio = origW / origH;

                let finalW, finalH;
                if (origRatio > targetRatio) {
                    // Original is wider than 4:5 -> Pad the height
                    finalW = origW;
                    finalH = finalW / targetRatio;
                } else {
                    // Original is taller than 4:5 -> Pad the width
                    finalH = origH;
                    finalW = finalH * targetRatio;
                }

                // Add 4% padding around the whole receipt to give it a premium "frame" look
                const padScale = 1.04;
                const paddedW = finalW * padScale;
                const paddedH = finalH * padScale;

                const wrapperCanvas = document.createElement('canvas');
                wrapperCanvas.width = paddedW;
                wrapperCanvas.height = paddedH;
                const ctx = wrapperCanvas.getContext('2d');

                // Fill with white background
                ctx.fillStyle = '#FFFFFF';
                ctx.fillRect(0, 0, paddedW, paddedH);

                // Draw original canvas centered inside the 4:5 canvas frame
                const dx = (paddedW - origW) / 2;
                const dy = (paddedH - origH) / 2;
                ctx.drawImage(originalCanvas, dx, dy);

                const link = document.createElement('a');
                link.download = `TMJH_Receipt_${getFilenameStr()}.png`;
                link.href = wrapperCanvas.toDataURL('image/png', 1.0);
                link.click();
                showToast('Image downloaded successfully');
            } catch (err) {
                console.error('Image Export Error:', err);
                showToast('Failed to generate Image. Please try again.');
            }
        }

        async function shareReceipt() {
            if (navigator.share) {
                try {
                    showToast('Preparing image for sharing...');
                    const element = document.getElementById('receipt');
                    await waitForAssets(element);

                    const canvas = await html2canvas(element, { 
                        scale: 3, 
                        useCORS: true, 
                        backgroundColor: '#FFFFFF',
                        scrollY: -window.scrollY
                    });
                    
                    canvas.toBlob(async (blob) => {
                        const file = new File([blob], `TMJH_Receipt_${getFilenameStr()}.png`, { type: 'image/png' });
                        const shareData = {
                            title: 'TMJH Jewellery Estimate',
                            text: 'Please find attached the jewellery calculation estimate from TMJH.',
                            files: [file]
                        };
                        
                        if (navigator.canShare && navigator.canShare(shareData)) {
                            await navigator.share(shareData);
                        } else {
                            showToast('Direct file sharing not supported on this device.');
                        }
                    }, 'image/png');
                } catch (err) {
                    console.error('Error sharing:', err);
                    showToast('Failed to share document.');
                }
            } else {
                showToast('Web Share API is not supported on your browser.');
            }
        }

        // --- EXPORT FIXES END ---

        // Initialize calculation on load
        calculate();
    </script>
</body>
